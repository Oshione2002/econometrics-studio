name: Apply Econometrics Studio v1.5 post-estimation upgrade

on:
  push:
    branches: [main]
    paths:
      - '.update/run_v15.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply exact-result diagnostics upgrade
        shell: bash
        run: |
          base64 -d .update/upgrade_v15.py.gz.b64 | gzip -d > /tmp/upgrade_v15.py
          python /tmp/upgrade_v15.py
          mkdir -p pages
          base64 -d .update/1_Diagnostics.py.gz.b64 | gzip -d > pages/1_Diagnostics.py
          grep -q 'APP_VERSION = "1.5.0"' app.py
          grep -q 'model_registry' app.py
          grep -q 'Previously estimated model' pages/1_Diagnostics.py
          grep -q 'exact fitted result' pages/1_Diagnostics.py
          python -m py_compile app.py pages/1_Diagnostics.py

      - name: Commit upgraded application
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.py README.md pages/1_Diagnostics.py
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m 'Use exact fitted models for post-estimation diagnostics'
            git push origin main
          fi

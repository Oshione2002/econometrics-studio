name: Apply Econometrics Studio v1.4 diagnostics upgrade

# Retriggered after the workflow became available on the default branch.
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-v1-4-upgrade.yml'
      - '.update/upgrade_v14.py.gz.b64'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode and run diagnostics upgrade
        shell: bash
        run: |
          base64 -d .update/upgrade_v14.py.gz.b64 | gzip -d > /tmp/upgrade_v14.py
          python /tmp/upgrade_v14.py
          grep -q 'APP_VERSION = "1.4.0"' app.py
          grep -q "8. Diagnostics" app.py
          grep -q "Run diagnostic tests" app.py
          python -m py_compile app.py

      - name: Commit application upgrade
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.py
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m 'Add comprehensive diagnostic tests workspace'
            git push origin main
          fi
